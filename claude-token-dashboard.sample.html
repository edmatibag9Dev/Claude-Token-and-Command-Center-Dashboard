<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Token Command Center</title>

<style>
:root{
  --brand:#2C7A6B; --brand-dk:#1f5a4f; --navy:#2B4C7E; --navy-dk:#1f3a63;
  --ink:#1b2733; --muted:#64748b; --line:#e6eaef; --bg:#f4f6f9; --card:#ffffff;
  --up:#15803d; --down:#b91c1c;            /* data green/red — kept separate from brand teal */
  --cowork:#2B4C7E; --code:#2C7A6B; --chat:#9333ea; --codex:#d97706; --cache:#94a3b8;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --serif:'Fraunces',Georgia,serif; --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);padding:28px;line-height:1.5}
.wrap{max-width:1320px;margin:0 auto}
h1{font-family:var(--serif);font-weight:600;font-size:1.9rem;color:var(--brand-dk);letter-spacing:-.01em}
h2{font-family:var(--serif);font-weight:600;font-size:1.15rem;color:var(--navy);margin-bottom:14px}
.sub{color:var(--muted);font-size:.92rem;margin-top:4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:22px}
.badge{display:inline-block;font:600 .68rem/1 var(--sans);text-transform:uppercase;letter-spacing:.06em;padding:4px 8px;border-radius:6px;vertical-align:middle}
.b-exact{background:#e6f4f1;color:var(--brand-dk)}
.b-est{background:#fef3e2;color:#b45309}
.b-live{background:#e8eefb;color:var(--navy-dk)}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.grid{display:grid;gap:18px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:18px}
.kpi .label{color:var(--muted);font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:6px}
.kpi .val{font-family:var(--mono);font-weight:600;font-size:1.85rem;color:var(--ink);margin-top:8px}
.kpi .val.brand{color:var(--brand)} .kpi .val.navy{color:var(--navy)}
.kpi .meta{color:var(--muted);font-size:.8rem;margin-top:4px}
.limits{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:18px}
.bar{height:8px;border-radius:6px;background:#eef1f5;overflow:hidden;margin:10px 0 6px}
.bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--brand),var(--navy))}
.charts{grid-template-columns:1fr 1fr;margin-bottom:18px}
.chart-box{height:330px;position:relative}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;color:var(--muted);font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:2px solid var(--line)}
td{padding:10px 12px;border-bottom:1px solid var(--line)}
tbody tr:hover{background:#fafbfc}
.num{font-family:var(--mono);text-align:right}
.pill{display:inline-block;font:600 .72rem/1 var(--sans);padding:3px 9px;border-radius:20px}
.p-cowork{background:#e8eefb;color:var(--navy-dk)} .p-code{background:#e6f4f1;color:var(--brand-dk)}
.p-codex{background:#fdf0df;color:#b45309} .p-other{background:#eef1f5;color:var(--muted)}
.k-sub{color:var(--muted);font-style:italic}
.empty{text-align:center;padding:38px 20px;color:var(--muted)}
.empty code{display:inline-block;background:#0f172a;color:#e2e8f0;font-family:var(--mono);font-size:.82rem;padding:10px 14px;border-radius:8px;margin-top:12px}
.banner{background:#fff8ec;border:1px solid #f5d9a8;color:#92600a;border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:.9rem}
.foot{color:var(--muted);font-size:.82rem;text-align:center;margin-top:8px;padding:16px;line-height:1.6}
.tag{font-family:var(--mono);font-size:.78rem;color:var(--brand-dk)}
.section{margin-bottom:18px}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>Claude Token Command Center</h1>
      <div class="sub" id="subline"></div>
      <div class="legend">
        <span class="badge b-exact">Exact</span><span class="sub" style="margin:0">local logs</span>
        <span class="badge b-est">Est</span><span class="sub" style="margin:0">web chat</span>
        <span class="badge b-live">Live</span><span class="sub" style="margin:0">plan limits</span>
      </div>
    </div>
    <div class="card" style="min-width:240px">
      <div class="kpi"><div class="label">Plan <span class="badge b-live">Live</span></div>
        <div class="val navy" id="plan">—</div>
        <div class="meta" id="billing">—</div></div>
    </div>
  </div>

  <div id="banner-slot"></div>

  <!-- LIVE PLAN LIMITS -->
  <div class="section">
    <h2>Plan limits <span class="badge b-live">Live</span></h2>
    <div class="grid limits" id="limits"></div>
  </div>

  <!-- EXACT TOKEN KPIs -->
  <div class="section">
    <h2>Token usage <span class="badge b-exact">Exact</span> <span class="sub" style="margin:0">cache excluded from total</span></h2>
    <div class="grid kpis" id="kpis"></div>
  </div>

  <!-- CHARTS -->
  <div class="grid charts">
    <div class="card"><h2>Daily burn by source</h2><div class="chart-box"><canvas id="trend"></canvas></div></div>
    <div class="card"><h2>Source mix</h2><div class="chart-box"><canvas id="mix"></canvas></div></div>
  </div>

  <!-- SESSIONS -->
  <div class="card section">
    <h2 id="sessions-h">Sessions</h2>
    <div id="sessions-wrap"></div>
  </div>

  <!-- COMMAND CENTER -->
  <div class="grid charts">
    <div class="card section">
      <h2>Skills usage <span class="badge b-exact">Exact</span> <span class="sub" style="margin:0">from local logs</span></h2>
      <div id="skills-wrap"></div>
    </div>
    <div class="card section">
      <h2>MCP connectors <span class="badge b-exact">Exact</span> <span class="sub" style="margin:0">tool calls by connector</span></h2>
      <div id="connectors-wrap"></div>
    </div>
  </div>

  <!-- DAILY DETAIL -->
  <div class="card section">
    <h2>Daily detail <span class="badge b-exact">Exact</span></h2>
    <div id="daily-wrap"></div>
  </div>

  <div class="card foot" id="foot"></div>
</div>

/* ===================== RENDER ===================== */
const fmt = n => (n||0).toLocaleString('en-US');
const k = n => (n>=1000 ? (n/1000).toFixed(n>=100000?0:1)+'k' : String(n||0));
const SOURCES = [
  {key:'cowork_tokens', label:'Cowork', color:'var(--cowork)'},
  {key:'claude_code_tokens', label:'Claude Code', color:'var(--code)'},
  {key:'claude_chat_est', label:'Chat (est)', color:'var(--chat)'},
];
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

document.getElementById('subline').textContent =
  `${USAGE_SUMMARY.billingPeriod} · last updated ${LAST_UPDATED}`;
document.getElementById('plan').textContent = USAGE_SUMMARY.plan;
document.getElementById('billing').textContent = `Billing ${USAGE_SUMMARY.billingPeriod}`;

/* ---- live limits ---- */
const extraPct = Math.round(USAGE_SUMMARY.extraUsageSpent / USAGE_SUMMARY.extraUsageLimit * 100);
const limitCards = [
  {label:'Current session', val:USAGE_SUMMARY.currentSessionPct+'%', pct:USAGE_SUMMARY.currentSessionPct, meta:(100-USAGE_SUMMARY.currentSessionPct)+'% remaining'},
  {label:'Weekly · all models', val:USAGE_SUMMARY.weeklyAllPct+'%', pct:USAGE_SUMMARY.weeklyAllPct, meta:'Sonnet-only '+USAGE_SUMMARY.weeklySonnetPct+'%'},
  {label:'Extra usage', val:'$'+USAGE_SUMMARY.extraUsageSpent.toFixed(2), pct:extraPct, meta:'of $'+USAGE_SUMMARY.extraUsageLimit+' ('+extraPct+'%)'},
  {label:'Credit balance', val:'$'+USAGE_SUMMARY.currentBalance.toFixed(2), pct:null, meta:'Daily routines '+USAGE_SUMMARY.dailyRoutineRuns},
];
document.getElementById('limits').innerHTML = limitCards.map(c=>`
  <div class="card kpi">
    <div class="label">${c.label} <span class="badge b-live">Live</span></div>
    <div class="val">${c.val}</div>
    ${c.pct!=null?`<div class="bar"><i style="width:${Math.min(c.pct,100)}%"></i></div>`:''}
    <div class="meta">${c.meta}</div>
  </div>`).join('');

/* ---- exact KPIs from DAILY_BURN ---- */
const sum = key => DAILY_BURN.reduce((a,r)=>a+(r[key]||0),0);
const coworkT = sum('cowork_tokens'), codeT = sum('claude_code_tokens');
const chatT = sum('claude_chat_est');
const grandTotal = coworkT + codeT + chatT;   // Claude sources only — Codex burn lives on the Token Burn dashboard, not here
const cacheTotal = sum('_cache_cowork') + sum('_cache_claude_code');
const pct = v => grandTotal? Math.round(v/grandTotal*100) : 0;
const days = DAILY_BURN.length;
const avg = days? Math.round(grandTotal/days) : 0;

document.getElementById('kpis').innerHTML = [
  {label:'Total tokens', val:fmt(grandTotal), cls:'brand', meta:`${days} day${days===1?'':'s'} · cache excluded`},
  {label:'Cache (separate)', val:fmt(cacheTotal), cls:'', meta:'priced ~10× cheaper'},
  {label:'Cowork', val:k(coworkT), cls:'navy', meta:pct(coworkT)+'% of total'},
  {label:'Claude Code', val:k(codeT), cls:'brand', meta:pct(codeT)+'% of total'},
  {label:'Daily average', val:k(avg), cls:'', meta:'tokens / active day'},
].map(c=>`<div class="card kpi"><div class="label">${c.label} <span class="badge b-exact">Exact</span></div>
  <div class="val ${c.cls}">${c.val}</div><div class="meta">${c.meta}</div></div>`).join('');

/* ---- empty-state banner ---- */
if (days === 0) {
  document.getElementById('banner-slot').innerHTML = `<div class="banner">
    <strong>Awaiting first exact ingest.</strong> Plan limits above are live, but no per-day token
    data has been measured yet. Run the ingesters natively on the Mac, then the next scheduled
    refresh will fill these charts:
    <div style="margin-top:8px"><code style="background:#0f172a;color:#e2e8f0;padding:8px 12px;border-radius:6px;display:inline-block;font-family:var(--mono)">cd ~/Claude/Projects/"Token Burn Dashboard" && ./ingest/run-all.sh</code></div>
  </div>`;
}

/* ---- charts ---- */
if (days > 0) {
  const labels = DAILY_BURN.map(r=>r.date.slice(5));
  new Chart(document.getElementById('trend'), {
    type:'bar',
    data:{labels, datasets: SOURCES.filter(s=>sum(s.key)>0).map(s=>({
      label:s.label, data:DAILY_BURN.map(r=>r[s.key]||0),
      backgroundColor:css(s.color.replace('var(','').replace(')','')) || s.color
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:k}}},
      plugins:{legend:{position:'bottom'}}}
  });
  const mixVals = SOURCES.map(s=>sum(s.key));
  new Chart(document.getElementById('mix'), {
    type:'doughnut',
    data:{labels:SOURCES.map(s=>s.label),
      datasets:[{data:mixVals,backgroundColor:['#2B4C7E','#2C7A6B','#9333ea','#d97706'],borderColor:'#fff',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'bottom'}}}
  });
} else {
  for (const id of ['trend','mix']) {
    const c=document.getElementById(id); const p=c.parentElement;
    p.innerHTML='<div class="empty">No exact data yet — run the ingesters.</div>';
  }
}

/* ---- sessions table ---- */
const isSample = SESSIONS.some(s=>s._sample);
const sessBadge = isSample? '<span class="badge b-est">Sample</span>' : '<span class="badge b-exact">Exact</span>';
document.getElementById('sessions-h').innerHTML = `Sessions ${sessBadge}` +
  (isSample? ' <span class="sub" style="margin:0">placeholder rows — run ingest-sessions.mjs</span>':'');
const pcls = s => s==='cowork'?'p-cowork':s==='claude_code'?'p-code':s==='codex'?'p-codex':'p-other';
const plabel = s => s==='claude_code'?'Claude Code':s.charAt(0).toUpperCase()+s.slice(1);
const escH = v => String(v==null?'':v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const MODEL_LABEL = m => String(m).replace('claude-','').replace('opus-4-8','Opus 4.8').replace('sonnet-4-6','Sonnet 4.6').replace('haiku-4-5','Haiku 4.5').replace('fable-5','Fable 5').replace(/-/g,' ').trim();
const topModel = s => { const m=s.models; if(!m) return '—'; if(Array.isArray(m)) return m.length?MODEL_LABEL(m[0]):'—'; const e=Object.entries(m).sort((a,b)=>b[1]-a[1])[0]; return e?MODEL_LABEL(e[0]):'—'; };
let sessSort={k:'tokens',dir:-1};
const SESS_COLS=[
  {label:'Session',k:'title',sortable:false,align:'left'},
  {label:'Source',k:'source',sortable:false,align:'left'},
  {label:'Model',k:'_model',sortable:false,align:'left'},
  {label:'Date',k:'date',sortable:true,align:'left'},
  {label:'In',k:'input_tokens',sortable:true,align:'right'},
  {label:'Out',k:'output_tokens',sortable:true,align:'right'},
  {label:'Tokens',k:'tokens',sortable:true,align:'right'},
  {label:'Cache',k:'cache_tokens',sortable:true,align:'right'},
  {label:'Cost',k:'cost',sortable:true,align:'right'},
];
function renderSessionsTable(){
  const wrap=document.getElementById('sessions-wrap');
  if (!SESSIONS.length){
    wrap.innerHTML='<div class="empty">No sessions yet — run <span class="tag">node ingest/ingest-sessions.mjs</span></div>';
    return;
  }
  const seen=new Set();
  const uniq=SESSIONS.filter(r=>{const kk=(r.id||'')+'|'+(r.file||'')+'|'+r.tokens+'|'+r.cache_tokens+'|'+r.title; if(seen.has(kk))return false; seen.add(kk); return true;});
  const sorted=uniq.sort((a,b)=>{const x=a[sessSort.k],y=b[sessSort.k]; return (x<y?-1:x>y?1:0)*sessSort.dir;}).slice(0,40);
  const rows=sorted.map(s=>`<tr>
    <td>${escH(s.title||'—')}${s.kind==='subagent'?' <span class="k-sub">· subagent</span>':''}</td>
    <td><span class="pill ${pcls(s.source)}">${plabel(s.source)}</span></td>
    <td>${escH(topModel(s))}</td>
    <td>${s.date||'—'}</td>
    <td class="num">${k(s.input_tokens)}</td>
    <td class="num">${k(s.output_tokens)}</td>
    <td class="num"><strong>${k(s.tokens)}</strong></td>
    <td class="num">${k(s.cache_tokens)}</td>
    <td class="num">${s.cost==null?'<span class="sub">pending</span>':'$'+s.cost.toFixed(2)}</td>
  </tr>`).join('');
  const head=SESS_COLS.map(c=>{
    const arrow=(c.sortable && sessSort.k===c.k)?(sessSort.dir<0?' ▾':' ▴'):'';
    const cls=c.sortable?' class="sortable" style="cursor:pointer'+(c.align==='right'?';text-align:right':'')+'"':(c.align==='right'?' style="text-align:right"':'');
    const dk=c.sortable?` data-k="${c.k}"`:'';
    return `<th${cls}${dk}>${c.label}${arrow}</th>`;
  }).join('');
  wrap.innerHTML=`<table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`
    +`<div class="sub" style="margin-top:8px">Cost = notional API list-price equivalent (flat-rate Max plan — not an actual bill). Cache priced at the read rate (0.1× input); rows with no recorded model use the Sonnet 4.6 rate.</div>`;
  wrap.querySelectorAll('th.sortable').forEach(th=>{
    th.addEventListener('click',()=>{const kk=th.dataset.k; sessSort.dir=(sessSort.k===kk?-sessSort.dir:-1); sessSort.k=kk; renderSessionsTable();});
  });
}
renderSessionsTable();

/* ---- command center: skills + connectors (exact, from usage-breakdown.json) ---- */
(function renderCommandCenter(){
  const U = (typeof USAGE_BREAKDOWN!=='undefined' && USAGE_BREAKDOWN) || {skills:[],connectors:[]};
  const escC = v => String(v==null?'':v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const renderList = (wrapId, items, nameOf, subOf) => {
    const wrap = document.getElementById(wrapId);
    if (!wrap) return;
    if (!items || !items.length){
      wrap.innerHTML = '<div class="empty">No usage yet — run <span class="tag">node ingest/ingest-usage.mjs</span></div>';
      return;
    }
    const max = Math.max(...items.map(i=>i.count||0), 1);
    wrap.innerHTML = items.slice(0,12).map(i=>{
      const pct = Math.round((i.count||0)/max*100);
      return `<div style="margin:0 0 14px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px">
          <span style="font-weight:600">${escC(nameOf(i))}</span>
          <span style="font-family:ui-monospace,'IBM Plex Mono',monospace;color:var(--navy)">${fmt(i.count)}</span>
        </div>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <div class="sub" style="margin:0">${escC(subOf(i))}</div>
      </div>`;
    }).join('');
  };
  renderList('skills-wrap', U.skills, i=>i.name,
    i=>`last used ${i.lastUsed||'—'}${i.sources?` · cowork ${i.sources.cowork||0} / code ${i.sources.claude_code||0}`:''}`);
  renderList('connectors-wrap', U.connectors, i=>i.label||i.server,
    i=>{ const t=(i.tools&&i.tools[0])?`top: ${i.tools[0].name} (${i.tools[0].count})`:''; return `last used ${i.lastUsed||'—'}${t?` · ${t}`:''}`; });
})();

/* ---- daily detail ---- */
if (days) {
  const rows = [...DAILY_BURN].reverse().map(r=>`<tr>
    <td>${r.date}</td>
    <td class="num">${k(r.cowork_tokens)}</td>
    <td class="num">${k(r.claude_code_tokens)}</td>
    <td class="num">${k(r.claude_chat_est)}</td>
    <td class="num"><strong>${fmt((r.cowork_tokens||0)+(r.claude_code_tokens||0)+(r.claude_chat_est||0))}</strong></td>
    <td class="num"><span class="sub">${k((r._cache_cowork||0)+(r._cache_claude_code||0))}</span></td>
  </tr>`).join('');
  document.getElementById('daily-wrap').innerHTML = `<table><thead><tr>
    <th>Date</th><th>Cowork</th><th>Claude Code</th><th>Chat est</th><th>Total</th><th>Cache</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
} else {
  document.getElementById('daily-wrap').innerHTML =
    '<div class="empty">No daily rows yet.</div>';
}

/* ---- footer ---- */
document.getElementById('foot').innerHTML =
  `Last updated <strong>${LAST_UPDATED}</strong> (America/Los_Angeles) · ${USAGE_SUMMARY.note}<br>` +
  `Token totals are <span class="badge b-exact">Exact</span> from local logs (cache excluded); ` +
  `web-chat is <span class="badge b-est">Est</span>; plan limits are <span class="badge b-live">Live</span> from claude.ai.`;
</script>
